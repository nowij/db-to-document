<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="common/layout :: layout (~{::title}, ~{::section})">

<head>
    <title>테이블 선택</title>
</head>

<section>

    <div class="max-w-5xl mx-auto bg-white p-6 rounded shadow space-y-6">

        <!-- 제목 -->
        <h2 class="text-2xl font-bold text-center">테이블 선택</h2>

        <!-- 스키마 선택 -->
        <div>
            <label class="font-semibold">스키마 선택</label>
            <select name="schema"
                    class="w-full border p-2 rounded mt-1">
                <option value="">-- 선택 --</option>
                <option th:each="schema : ${schemas}"
                        th:value="${schema}"
                        th:text="${schema}">
                </option>
            </select>
        </div>

        <!-- 테이블 목록 -->
        <div>
            <div class="flex justify-between items-center mb-2">
                <label class="font-semibold">테이블 목록</label>

                <!-- 전체 선택 -->
                <label class="flex items-center gap-2 text-sm">
                    <input type="checkbox" id="checkAll">
                    전체 선택
                </label>
            </div>

            <!-- 검색 -->
            <input type="text" placeholder="테이블 검색"
                   id="tableSearch"
                   class="w-full border p-2 rounded mb-2">

            <!-- 리스트 -->
            <div class="border rounded p-3 max-h-60 overflow-y-auto space-y-1">

                <div th:each="table : ${tables}" class="table-item">
                    <label class="flex items-center gap-2">
                        <input type="checkbox" name="tables"
                               th:value="${table}">
                        <span th:text="${table}"></span>
                    </label>
                </div>

            </div>
        </div>

        <!-- 엑셀 컬럼 선택 -->
        <div>
            <label class="font-semibold mb-2 block">엑셀 포함 항목</label>

            <div class="grid grid-cols-2 md:grid-cols-3 gap-2">

                <label class="flex items-center gap-2">
                    <input type="checkbox" name="columns" value="physicalName" checked>
                    물리명
                </label>

                <label class="flex items-center gap-2">
                    <input type="checkbox" name="columns" value="logicalName" checked>
                    논리명
                </label>

                <label class="flex items-center gap-2">
                    <input type="checkbox" name="columns" value="tableName" checked>
                    테이블명
                </label>

                <label class="flex items-center gap-2">
                    <input type="checkbox" name="columns" value="columnName" checked>
                    컬럼명
                </label>

                <label class="flex items-center gap-2">
                    <input type="checkbox" name="columns" value="dataType" checked>
                    데이터 타입
                </label>

                <label class="flex items-center gap-2">
                    <input type="checkbox" name="columns" value="nullable">
                    NULL 여부
                </label>

                <label class="flex items-center gap-2">
                    <input type="checkbox" name="columns" value="defaultValue">
                    기본값
                </label>

            </div>
        </div>

        <!-- 버튼 -->
        <div class="pt-4">
            <button type="button"
                    class="w-full bg-green-500 hover:bg-green-600 text-white py-3 rounded text-lg"
                    onclick="submitExcel()">
                엑셀 추출
            </button>
        </div>

    </div>

    <!-- JS -->
    <script>
        // 전체 선택
        document.getElementById('checkAll').addEventListener('change', function() {
            document.querySelectorAll('input[name="tables"]').forEach(cb => {
                cb.checked = this.checked;
            });
        });

        // 검색 필터
        document.getElementById('tableSearch').addEventListener('input', function() {
            const keyword = this.value.toLowerCase();

            document.querySelectorAll('.table-item').forEach(el => {
                const text = el.innerText.toLowerCase();
                el.style.display = text.includes(keyword) ? '' : 'none';
            });
        });

        // 엑셀 요청
        function submitExcel() {
            const tables = [...document.querySelectorAll('input[name="tables"]:checked')]
                .map(el => el.value);

            const columns = [...document.querySelectorAll('input[name="columns"]:checked')]
                .map(el => el.value);

            if (tables.length === 0) {
                alert("테이블을 선택하세요");
                return;
            }

            console.log("tables:", tables);
            console.log("columns:", columns);

            // TODO: API 호출
            // fetch('/api/excel', {...})
        }
    </script>

</section>
</html>
