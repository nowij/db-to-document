<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="common/layout :: layout (~{::title}, ~{::section})">

<head>
    <title>DB 연결</title>
</head>

<section>
    <div class="max-w-xl mx-auto bg-white p-6 rounded shadow">

        <h2 class="text-2xl font-bold mb-6 text-center">
            DB 연결 정보 입력
        </h2>

        <form method="post" action="/connect" class="space-y-4">

            <!-- DB 종류 -->
            <div>
                <label class="block mb-1 font-semibold">DB 종류</label>
                <select name="dbType" class="w-full border p-2 rounded">
                    <option value="mysql">MySQL</option>
                    <option value="mariadb">MariaDB</option>
                    <option value="postgres">PostgreSQL</option>
                    <option value="oracle">Oracle</option>
                </select>
            </div>

            <!-- Host -->
            <div>
                <label class="block mb-1 font-semibold">Host</label>
                <input type="text" name="host" class="w-full border p-2 rounded" placeholder="localhost">
            </div>

            <!-- Port -->
            <div>
                <label class="block mb-1 font-semibold">Port</label>
                <input type="text" name="port" class="w-full border p-2 rounded" placeholder="3306">
            </div>

            <!-- DB Name -->
            <div>
                <label class="block mb-1 font-semibold">DB Name</label>
                <input type="text" name="dbName" class="w-full border p-2 rounded">
            </div>

            <!-- User -->
            <div>
                <label class="block mb-1 font-semibold">User</label>
                <input type="text" name="username" class="w-full border p-2 rounded">
            </div>

            <!-- Password -->
            <div>
                <label class="block mb-1 font-semibold">Password</label>
                <input type="password" name="password" class="w-full border p-2 rounded">
            </div>

            <!-- 버튼 -->
            <div class="flex gap-3 pt-4">
                <button type="submit"
                        class="flex-1 bg-blue-500 hover:bg-blue-600 text-white py-2 rounded">
                    연결
                </button>

                <button type="button"
                        class="flex-1 bg-gray-400 hover:bg-gray-500 text-white py-2 rounded">
                    테스트
                </button>
            </div>

        </form>

    </div>

</section>
</html>
